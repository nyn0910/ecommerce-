{% extends "base.html" %}
{% block title %}{{ 'Edit product' if product else 'Add product' }}{% endblock %}
{% block content %}
<div class="form-card wide">
  <h1>{{ 'Edit product' if product else 'Add product' }}</h1>
  <form method="post" enctype="multipart/form-data">
    <div class="field">
      <label for="name">Product name</label>
      <input type="text" id="name" name="name" value="{{ product.name if product else '' }}" required>
    </div>
    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3">{{ product.description if product else '' }}</textarea>
    </div>
    <div class="form-row">
      <div class="field">
        <label for="price">Price ₹</label>
        <input type="number" step="0.01" id="price" name="price" value="{{ product.price if product else '' }}" required>
      </div>
      <div class="field">
        <label for="stock">Stock</label>
        <input type="number" id="stock" name="stock" value="{{ product.stock if product else 10 }}">
      </div>
    </div>
    <div class="field">
      <label for="category">Category</label>
      <input type="text" id="category" name="category" value="{{ product.category if product else '' }}" required>
    </div>
    <div class="field">
      <label for="image">Product image {% if product %}(leave empty to keep current){% endif %}</label>
      {% if product %}
        <img src="{{ product.image_url }}" alt="current image" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-bottom:8px;">
      {% endif %}
      <input type="file" id="image" name="image" accept="image/*">
    </div>
    <button type="submit" class="btn btn-block">{{ 'Update product' if product else 'Create product' }}</button>
  </form>
</div>
{% endblock %}
